<!DOCTYPE html>
  <html lang="ro">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cont confirmat – Vital Signs</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f6f9;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 48px 40px;
        max-width: 440px;
        width: 90%;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      }
      .icon {
        width: 72px;
        height: 72px;
        background: #e8f5e9;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon svg {
        width: 36px;
        height: 36px;
      }
      .app-name {
        font-size: 13px;
        color: #1a73e8;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 8px;
      }
      h1 {
        font-size: 24px;
        color: #1a1a2e;
        font-weight: 700;
        margin-bottom: 16px;
      }
      p {
        font-size: 15px;
        color: #555;
        line-height: 1.7;
        margin-bottom: 12px;
      }
      .note {
        font-size: 13px;
        color: #999;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <p class="app-name">Vital Signs</p>
      <h1>Cont confirmat cu succes!</h1>
      <p>Adresa ta de email a fost verificată. Contul tău în aplicația <strong>Vital Signs</strong> este acum activ.</p>
      <p>Poți închide această pagină și te poți autentifica din aplicație.</p>
      <p class="note">Dacă nu tu ai creat acest cont, contactează-ne imediat.</p>
    </div>
  </body>
  </html>
